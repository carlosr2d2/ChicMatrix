name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run unit tests with coverage
        run: pytest -m "not playwright and not e2e" --cov=app --cov-report=term-missing --cov-fail-under=70 -v

      - name: Run Playwright browser integration tests
        run: pytest -m "playwright and not e2e" -v

      - name: Run auth E2E tests (Playwright API)
        run: pytest -m e2e -v

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests with coverage
        run: npm run test:ci

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
          NEXT_PUBLIC_SOCIAL_AUTH_DEBUG: true

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start database and API
        run: docker compose up -d db redis backend

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8001/health > /dev/null; then
              echo "Backend is ready, waiting for migrations..."
              sleep 8
              curl -sf http://localhost:8001/health
              exit 0
            fi
            sleep 3
          done
          echo "Backend failed to start"
          docker compose logs backend
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          E2E_WITH_BACKEND: true
          NEXT_PUBLIC_API_URL: http://localhost:8001
          NEXT_PUBLIC_SOCIAL_AUTH_DEBUG: true
          API_INTERNAL_URL: http://localhost:8001
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run test:e2e

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, frontend-e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build backend frontend worker
